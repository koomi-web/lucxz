    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* ปรับโทนสีพื้นหลังเป็น เทา-ชมพู ตามความชอบ */
            background: linear-gradient(135deg, #f3f4f6 0%, #fcecf2 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.05), 
                        inset 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .virtual-card:hover {
            transform: translateY(-4px);
        }
        .virtual-card:active {
            transform: translateY(2px) scale(0.98);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>

    <!-- Animation Scripts (คงไว้ 100%) -->
    <script>
        function copyText(text, containerElement, type) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                showToast();

                const buttonElement = containerElement.querySelector('.kbank-btn');
                const originalHtml = buttonElement.innerHTML;
                
                buttonElement.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                    สำเร็จ
                `;
                buttonElement.classList.replace('bg-white', 'bg-white/20');
                buttonElement.classList.replace('text-gray-700', 'text-white');
                
                setTimeout(() => {
                    buttonElement.innerHTML = originalHtml;
                    buttonElement.classList.replace('bg-white/20', 'bg-white');
                    buttonElement.classList.replace('text-white', 'text-gray-700');
                }, 2000);

            } catch (err) {
                console.error('ไม่สามารถคัดลอกได้:', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2500);
        }
    </script>
